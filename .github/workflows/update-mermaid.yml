name: Auto Update Repositories Tag Tree

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Perfect Nested Tag Tree with Mode Toggles
        env:
          GH_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 1. 원본 대소문자 매핑 딕셔너리 도우미
          CASE_MAP = {
              "browserextension": "browserExtension",
              "paddleocr": "paddleOCR",
              "wsl": "WSL",
              "pdf": "PDF",
              "ocr": "OCR",
              "gemini": "Gemini"
          }

          def get_display_name(key):
              return CASE_MAP.get(key.lower(), key)

          # 2. 모든 레포지토리 API 수집
          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "User-Agent": "Python-Script",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      if not data:
                          break
                      repos.extend(data)
                      page += 1
              except Exception as e:
                  print(f"API Error: {e}")
                  break

          # 3. 트리 데이터 구조 구축
          def create_node():
              return {"_sub": {}, "_direct_repos": {}}

          tree = create_node()
          untagged_repos = {}

          for repo in repos:
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              r_name = repo['name']
              r_url = repo['html_url']

              if not topics:
                  untagged_repos[r_name] = r_url
                  continue

              for topic in topics:
                  parts = topic.split('-')
                  curr = tree
                  for part in parts:
                      if part not in curr["_sub"]:
                          curr["_sub"][part] = create_node()
                      curr = curr["_sub"][part]
                  curr["_direct_repos"][r_name] = r_url

          # 4. 하위 자식 노드의 모든 레포 수집 함수
          def get_all_repos_recursive(node):
              res = dict(node["_direct_repos"])
              for sub_node in node["_sub"].values():
                  res.update(get_all_repos_recursive(sub_node))
              return res

          # 5. HTML 트리 렌더링 함수 (단일 / 하위포함 토글 버튼 분리)
          def render_html_tree(node_sub):
              lines = ["<ul>"]
              sorted_keys = sorted(node_sub.keys(), key=lambda x: x.lower())

              for key in sorted_keys:
                  child = node_sub[key]
                  display_key = get_display_name(key)

                  direct_repos = child["_direct_repos"]
                  all_repos = get_all_repos_recursive(child)
                  has_sub = len(child["_sub"]) > 0

                  lines.append("<li>")
                  
                  # 하위 카테고리가 있는 경우: [단일 레포] 토글과 [하위 포함 전체] 토글을 함께 제공
                  if has_sub:
                      lines.append(f"<b><code>{display_key}</code></b>")
                      lines.append("<ul>")
                      
                      # 옵션 1: 해당 태그 전용 레포
                      if direct_repos:
                          lines.append(f"<li><details><summary>📄 <b>이 태그 전용 레포</b> ({len(direct_repos)})</summary><ul>")
                          for r_name, r_url in sorted(direct_repos.items(), key=lambda x: x[0].lower()):
                              lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                          lines.append("</ul></details></li>")
                      
                      # 옵션 2: 하위 포함 전체 레포
                      lines.append(f"<li><details><summary>📦 <b>하위 포함 전체 레포</b> ({len(all_repos)})</summary><ul>")
                      for r_name, r_url in sorted(all_repos.items(), key=lambda x: x[0].lower()):
                          lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                      lines.append("</ul></details></li>")
                      
                      lines.append("</ul>")

                  # 하위 카테고리가 없는 최하위 태그인 경우: 단순 토글 하나로 처리
                  else:
                      if direct_repos:
                          lines.append(f"<details><summary><b><code>{display_key}</code></b> ({len(direct_repos)})</summary>")
                          lines.append("<ul>")
                          for r_name, r_url in sorted(direct_repos.items(), key=lambda x: x[0].lower()):
                              lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                          lines.append("</ul></details>")
                      else:
                          lines.append(f"<b><code>{display_key}</code></b> (0)")

                  # 하위 서브 태그가 있으면 재귀적으로 렌더링하여 들여쓰기 유지
                  if has_sub:
                      lines.extend(render_html_tree(child["_sub"]))

                  lines.append("</li>")

              lines.append("</ul>")
              return lines

          lines = ["### 🏷️ Repository Topics Map\n"]

          if not tree["_sub"] and not untagged_repos:
              lines.append("<p>레포지토리가 존재하지 않습니다.</p>")
          else:
              lines.extend(render_html_tree(tree["_sub"]))

              # 빨간색 태그없음 항목
              if untagged_repos:
                  lines.append("<ul><li>")
                  lines.append(f'<details><summary><font color="red"><b>태그없음</b></font> ({len(untagged_repos)})</summary>')
                  lines.append("<ul>")
                  for r_name, r_url in sorted(untagged_repos.items(), key=lambda x: x[0].lower()):
                      lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                  lines.append("</ul></details>")
                  lines.append("</li></ul>")

          list_content = "\n".join(lines)

          # 6. README.md 치환
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n\n{list_content}\n\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully updated README.md with case preservation and explicit toggles!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: support UI sub-toggles and camelCase tag names"
            git push
          else
            echo "No changes detected in README.md"
          fi
