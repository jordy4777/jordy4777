name: Auto Update Repositories Tag Tree

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Perfect Nested Tag Tree
        env:
          GH_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 🎛️ 상위 태그 토글을 열 때 하위 태그 레포까지 통합할지 여부
          INCLUDE_CHILD_REPOS = True

          # 1. 모든 레포지토리 API 수집
          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "User-Agent": "Python-Script",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      if not data:
                          break
                      repos.extend(data)
                      page += 1
              except Exception as e:
                  print(f"API Error: {e}")
                  break

          # 2. 트리 데이터 구조 구축
          def create_node():
              return {"_sub": {}, "_direct_repos": {}}

          tree = create_node()
          untagged_repos = {}

          for repo in repos:
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              r_name = repo['name']
              r_url = repo['html_url']

              if not topics:
                  untagged_repos[r_name] = r_url
                  continue

              for topic in topics:
                  parts = topic.split('-')
                  curr = tree
                  for part in parts:
                      if part not in curr["_sub"]:
                          curr["_sub"][part] = create_node()
                      curr = curr["_sub"][part]
                  curr["_direct_repos"][r_name] = r_url

          # 3. 하위 자식 노드의 모든 레포 수집
          def get_all_repos_recursive(node):
              res = dict(node["_direct_repos"])
              for sub_node in node["_sub"].values():
                  res.update(get_all_repos_recursive(sub_node))
              return res

          # 4. Pure HTML 기반 계층형 트리 렌더링 함수 (들여쓰기 보장)
          def render_html_tree(node_sub):
              lines = ["<ul>"]
              sorted_keys = sorted(node_sub.keys(), key=lambda x: x.lower())

              for key in sorted_keys:
                  child = node_sub[key]
                  
                  if INCLUDE_CHILD_REPOS:
                      repos_to_show = get_all_repos_recursive(child)
                  else:
                      repos_to_show = child["_direct_repos"]

                  total_count = len(repos_to_show)

                  lines.append("<li>")
                  
                  # 레포지토리가 있으면 토글로 묶음
                  if repos_to_show:
                      lines.append(f"<details><summary><b><code>{key}</code></b> ({total_count})</summary>")
                      lines.append("<ul>")
                      for r_name, r_url in sorted(repos_to_show.items(), key=lambda x: x[0].lower()):
                          lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                      lines.append("</ul>")
                      lines.append("</details>")
                  else:
                      lines.append(f"<b><code>{key}</code></b> (0)")

                  # 하위 태그가 있으면 <ul>로 감싸서 완벽하게 들여쓰기(Nested) 생성
                  if child["_sub"]:
                      lines.extend(render_html_tree(child["_sub"]))

                  lines.append("</li>")

              lines.append("</ul>")
              return lines

          lines = ["### 🏷️ Repository Topics Map\n"]

          if not tree["_sub"] and not untagged_repos:
              lines.append("<p>레포지토리가 존재하지 않습니다.</p>")
          else:
              lines.extend(render_html_tree(tree["_sub"]))

              # 빨간색 태그없음 항목 (font color="red" 적용)
              if untagged_repos:
                  lines.append("<ul><li>")
                  lines.append(f'<details><summary><font color="red"><b>태그없음</b></font> ({len(untagged_repos)})</summary>')
                  lines.append("<ul>")
                  for r_name, r_url in sorted(untagged_repos.items(), key=lambda x: x[0].lower()):
                      lines.append(f'<li><a href="{r_url}">{r_name}</a></li>')
                  lines.append("</ul></details>")
                  lines.append("</li></ul>")

          list_content = "\n".join(lines)

          # 5. README.md 치환
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n\n{list_content}\n\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully generated perfect nested tag tree!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: fix nested html list structure and red tag color"
            git push
          else
            echo "No changes detected in README.md"
          fi
