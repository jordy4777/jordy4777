name: Auto Update Repositories Tag Tree

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Tag Tree with Simple Repository Search
        env:
          GH_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import urllib.parse
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 1. 모든 레포지토리 API 수집
          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "User-Agent": "Python-Script",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      if not data:
                          break
                      repos.extend(data)
                      page += 1
              except Exception as e:
                  print(f"API Error: {e}")
                  break

          # 2. Multi-level 트리 구축
          tree = {"_children": {}, "_repos": set()}
          untagged_repos = []

          for repo in repos:
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              repo_name = repo['name']

              if not topics:
                  untagged_repos.append(repo_name)
                  continue

              for topic in topics:
                  parts = topic.split('-')
                  curr = tree
                  for part in parts:
                      if part not in curr["_children"]:
                          curr["_children"][part] = {"_children": {}, "_repos": set()}
                      curr = curr["_children"][part]
                      curr["_repos"].add(repo_name)

          # 3. 마크다운 생성 (개인 레포 탭의 단순 키워드 검색 URL 사용)
          def build_markdown_tree(node_children, prefix_path=[], indent_level=0):
              lines = []
              sorted_keys = sorted(node_children.keys(), key=lambda x: x.lower())
              
              for key in sorted_keys:
                  child_node = node_children[key]
                  current_path = prefix_path + [key]
                  repo_count = len(child_node["_repos"])
                  
                  # full_topic (예: productivity 또는 productivity-keyboard)
                  full_topic = "-".join(current_path)
                  
                  # 내 개인 Repositories 탭에서 해당 키워드로 직접 검색
                  encoded_query = urllib.parse.quote(full_topic)
                  search_url = f"https://github.com/{user}?tab=repositories&q={encoded_query}"
                  
                  indent = "  " * indent_level
                  lines.append(f"{indent}- [{key}]({search_url}) ({repo_count})")
                  
                  if len(child_node["_children"]) > 0:
                      lines.extend(build_markdown_tree(child_node["_children"], current_path, indent_level + 1))
                      
              return lines

          lines = ["### 🏷️ Repository Topics Map\n"]

          if not tree["_children"] and not untagged_repos:
              lines.append("- 레포지토리가 존재하지 않습니다.\n")
          else:
              lines.extend(build_markdown_tree(tree["_children"]))

              if untagged_repos:
                  lines.append(f"\n<details><summary><b>📂 태그 없는 레포지토리 목록 ({len(untagged_repos)})</b></summary>\n")
                  for r_name in sorted(untagged_repos, key=lambda x: x.lower()):
                      lines.append(f"- [{r_name}](https://github.com/{user}/{r_name})")
                  lines.append("\n</details>")

          list_content = "\n".join(lines)

          # 4. README.md 업데이트
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n\n{list_content}\n\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully updated README.md with simple repository search!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: simplify search URL to support private repos and precise filtering"
            git push
          else
            echo "No changes detected in README.md"
          fi
