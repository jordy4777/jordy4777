name: Auto Update Mermaid Repositories Map

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      repository-projects: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Mermaid Mindmap with Click Links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 1. Private 레포 포함 전체 목록 가져오기 API (authenticated user API)
          url = "https://api.github.com/user/repos?per_page=100&affiliation=owner"
          req = urllib.request.Request(url, headers={
              "Authorization": f"token {token}",
              "User-Agent": "Python-Script",
              "Accept": "application/vnd.github+json"
          })

          with urllib.request.urlopen(req) as response:
              repos = json.loads(response.read().decode())

          # 2. 태그(Topic)별 레포 분류
          category_tree = {}

          for repo in repos:
              # 프로필 레포지토리 자체나 아카이브된 레포만 스킵 (Fork 및 Private 포함!)
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              repo_name = repo['name']

              if not topics:
                  continue

              for topic in topics:
                  if '-' in topic:
                      cat, sub = topic.split('-', 1)
                  else:
                      cat, sub = topic, "general"

                  category_tree.setdefault(cat, {}).setdefault(sub, []).append(repo_name)

          # 3. Mermaid 문법 생성
          if not category_tree:
              # 괄호()를 제거하여 Mermaid 파싱 에러 방지
              mermaid_content = "```mermaid\ngraph TD\n    Root[" + user + "'s Repositories]\n    Root --> Notice[태그가 달린 레포지토리가 없습니다]\n```"
          else:
              mermaid = ["```mermaid", "graph TD", f"    Root[{user}'s Repositories]"]
              click_events = []
              node_id = 0

              for cat, subs in category_tree.items():
                  node_id += 1
                  cat_node = f"Cat_{node_id}"
                  mermaid.append(f"    Root --> {cat_node}[{cat}]")

                  for sub, repo_list in subs.items():
                      node_id += 1
                      sub_node = f"Sub_{node_id}"
                      topic_full = f"{cat}-{sub}" if sub != "general" else cat
                      mermaid.append(f"    {cat_node} --> {sub_node}[{topic_full}]")
                      
                      search_url = f"[https://github.com/](https://github.com/){user}?tab=repositories&q=topic%3A{topic_full}"
                      click_events.append(f'    click {sub_node} "{search_url}" "{topic_full} 태그 레포 보기"')

              mermaid.extend(click_events)
              mermaid.append("```")
              mermaid_content = "\n".join(mermaid)

          # 4. README.md 치환
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n{mermaid_content}\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully updated README.md!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update mermaid repositories map"
            git push
          else
            echo "No changes detected in README.md"
          fi
