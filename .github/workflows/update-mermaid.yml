name: Auto Update Repositories Tag Tree

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Nested Tag List with Links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 1. 모든 레포지토리(Private, Fork 포함) 페이징 조회
          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner,collaborator"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "User-Agent": "Python-Script",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      if not data:
                          break
                      repos.extend(data)
                      page += 1
              except Exception as e:
                  print(f"API Error: {e}")
                  break

          # 2. 태그(Topic)별 정리
          category_tree = {}
          untagged_repos = []

          for repo in repos:
              # 프로필 레포지토리 자체 및 아카이브 레포 스킵
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              repo_name = repo['name']

              if not topics:
                  untagged_repos.append(repo_name)
                  continue

              for topic in topics:
                  if '-' in topic:
                      cat, sub = topic.split('-', 1)
                  else:
                      cat, sub = topic, "general"

                  category_tree.setdefault(cat, {}).setdefault(sub, []).append(repo_name)

          # 3. 마크다운 중첩 리스트 (Nested List) 생성
          lines = ["### 🏷️ Repository Topics Map\n"]

          if not category_tree and not untagged_repos:
              lines.append("- 레포지토리가 존재하지 않습니다.\n")
          else:
              for cat, subs in sorted(category_tree.items()):
                  lines.append(f"- **`{cat}`**")
                  for sub, repo_list in sorted(subs.items()):
                      topic_full = f"{cat}-{sub}" if sub != "general" else cat
                      search_url = f"https://github.com/{user}?tab=repositories&q=topic%3A{topic_full}"
                      
                      # 하위 리스트 (클릭 시 해당 태그 검색으로 이동)
                      lines.append(f"  - 🔗 [{topic_full}]({search_url})")

              # 태그가 없는 레포지토리도 맨 아래에 나열 원할 경우 (필요 없으면 제거 가능)
              if untagged_repos:
                  lines.append("- **`untagged`**")
                  for r_name in sorted(untagged_repos):
                      lines.append(f"  - [{r_name}](https://github.com/{user}/{r_name})")

          list_content = "\n".join(lines)

          # 4. README.md 업데이트
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n\n{list_content}\n\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully updated README.md with Nested List!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update repository tag list"
            git push
          else
            echo "No changes detected in README.md"
          fi
