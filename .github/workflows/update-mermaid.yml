name: Auto Update Repositories Tag Tree

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Dynamic Tag Tree Generation
        env:
          GH_TOKEN: ${{ secrets.MY_GIT_TOKEN }}
          USER_NAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import json
          import urllib.request
          import re

          user = os.environ['USER_NAME']
          token = os.environ['GH_TOKEN']

          # 1. 모든 레포지토리 수집
          repos = []
          page = 1
          while True:
              url = f"https://api.github.com/user/repos?per_page=100&page={page}&affiliation=owner"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "User-Agent": "Python-Script",
                  "Accept": "application/vnd.github+json"
              })
              try:
                  with urllib.request.urlopen(req) as response:
                      data = json.loads(response.read().decode())
                      if not data:
                          break
                      repos.extend(data)
                      page += 1
              except Exception as e:
                  print(f"API Error: {e}")
                  break

          # 2. Multi-level 동적 트리 데이터 구조 구축
          # node = {"_sub": {}, "_direct_repos": {}, "_all_repos": {}}
          def create_node():
              return {"_sub": {}, "_direct_repos": {}, "_all_repos": {}}

          tree = create_node()
          untagged_repos = {}

          for repo in repos:
              if repo.get('archived') or repo['name'] == user:
                  continue
              
              topics = repo.get('topics', [])
              r_name = repo['name']
              r_url = repo['html_url']

              if not topics:
                  untagged_repos[r_name] = r_url
                  continue

              for topic in topics:
                  parts = topic.split('-')
                  curr = tree
                  curr["_all_repos"][r_name] = r_url
                  
                  for part in parts:
                      if part not in curr["_sub"]:
                          curr["_sub"][part] = create_node()
                      curr = curr["_sub"][part]
                      curr["_all_repos"][r_name] = r_url
                  
                  # 해당 하이픈 경로의 최하위 태그 노드에 레포 연결
                  curr["_direct_repos"][r_name] = r_url

          # 3. 마크다운 동적 생성 함수
          def render_tree(node_sub, indent=0):
              lines = []
              sorted_keys = sorted(node_sub.keys(), key=lambda x: x.lower())

              for key in sorted_keys:
                  child = node_sub[key]
                  space = "  " * indent
                  total_count = len(child["_all_repos"])

                  # 카테고리 헤더
                  lines.append(f"{space}- **`{key}`** ({total_count})")

                  # 해당 태그 단계에 직접 포함된 레포지토리 출력
                  for r_name, r_url in sorted(child["_direct_repos"].items(), key=lambda x: x[0].lower()):
                      lines.append(f"{space}  - [{r_name}]({r_url})")

                  # 하위 서브 카테고리가 존재하면 재귀적으로 렌더링
                  if child["_sub"]:
                      lines.extend(render_tree(child["_sub"], indent + 1))

              return lines

          lines = ["### 🏷️ Repository Topics Map\n"]

          if not tree["_sub"] and not untagged_repos:
              lines.append("- 레포지토리가 존재하지 않습니다.\n")
          else:
              lines.extend(render_tree(tree["_sub"]))

              if untagged_repos:
                  lines.append(f"\n<details><summary><b>📂 태그 없는 레포지토리 목록 ({len(untagged_repos)})</b></summary>\n")
                  for r_name, r_url in sorted(untagged_repos.items(), key=lambda x: x[0].lower()):
                      lines.append(f"- [{r_name}]({r_url})")
                  lines.append("\n</details>")

          list_content = "\n".join(lines)

          # 4. README.md 치환
          with open("README.md", "r", encoding="utf-8") as f:
              readme = f.read()

          pattern = r"(<!-- MERMAID_START -->)([\s\S]*?)(<!-- MERMAID_END -->)"
          replacement = f"\\1\n\n{list_content}\n\n\\3"
          new_readme = re.sub(pattern, replacement, readme)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)

          print("Successfully generated dynamic repository map!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: generate dynamic repository map"
            git push
          else
            echo "No changes detected in README.md"
          fi
